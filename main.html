<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styles.css">
    <!-- ดึงไลบรารี Chart.js มาเตรียมไว้สำหรับวาดกราฟในภาพที่ 1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

    <!-- Navigation Bar ด้านบน -->
    <nav class="navbar">
        <h1 class="logo" onclick="navigateTo('dashboard')">Finance</h1>
        <div class="nav-links">
            <button id="nav-dashboard-btn" onclick="navigateTo('dashboard')">Dashboard</button>
        </div>
    </nav>

    <main class="container">

        <!-- ================= PAGES 1 & 2: DASHBOARD ================= -->
        <section id="page-dashboard" class="view-page">
            <!-- ส่วน Summary Cards (ภาพที่ 1) -->
            <div class="summary-grid">
                <div class="card">
                    <h3>Total Balance</h3>
                    <p id="total-balance">฿0.00</p>
                </div>
                <div class="card">
                    <h3>Income</h3>
                    <p id="total-income">฿0.00</p>
                    <button class="btn btn-primary" onclick="navigateTo('add-income')">+ Add Income</button>
                </div>
                <div class="card">
                    <h3>Expenses</h3>
                    <p id="total-expenses">฿0.00</p>
                    <button class="btn btn-secondary" onclick="navigateTo('add-expense')">+ Add Expenses</button>
                </div>
                <div class="card">
                    <h3>Savings</h3>
                    <p id="total-savings">฿0.00</p>
                </div>
            </div>

            <!-- ส่วน Overview Graph (ภาพที่ 1) -->
            <div class="graph-container">
                <div class="section-header">
                    <div>
                        <h2>Overview</h2>
                        <p style="color: var(--text-muted); font-size: 13px;">Financial summary</p>
                    </div>

                    <div class="filter-buttons">
                        <button class="btn-filter active" onclick="changeFilter('day', this)">Today</button>
                        <button class="btn-filter" onclick="changeFilter('week', this)">This Week</button>
                        <button class="btn-filter" onclick="changeFilter('month', this)">This Month</button>
                    </div>
                </div>

                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="overviewChart"></canvas>
                </div>
            </div>

            <!-- ส่วน Recent Transactions (ภาพที่ 2) -->
            <div class="recent-container">
                <div class="section-header">
                    <h2>Recent Transactions</h2>
                    <button class="btn-text" onclick="navigateTo('all-transactions')">View All</button>
                </div>
                <div id="recent-list" class="transaction-list">
                    <!-- รายการล่าสุด 5-7 รายการจะถูกใส่เข้ามาด้วย JavaScript -->
                </div>
            </div>
        </section>

        <!-- ================= PAGE 3: ADD INCOME ================= -->
        <section id="page-add-income" class="view-page hidden">
            <div class="form-card">
                <h2>Add Income</h2>
                <form id="income-form" onsubmit="handleFormSubmit(event, 'income')">
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" step="0.01" id="income-amount" required placeholder="$ 0.00">
                    </div>
                    <div class="form-group">
                        <label>Source</label>
                        <input type="text" id="income-source" required placeholder="e.g., Salary, Freelance">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="income-date" required>
                    </div>
                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <textarea id="income-desc" placeholder="Add notes about this income"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-submit">Add Income</button>
                        <button type="button" class="btn btn-clear" onclick="clearForm('income-form')">Clear</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- ================= PAGE 4: ADD EXPENSE ================= -->
        <section id="page-add-expense" class="view-page hidden">
            <div class="form-card">
                <h2>Add Expense</h2>
                <form id="expense-form" onsubmit="handleFormSubmit(event, 'expense')">
                    <div class="form-group">
                        <label>Amount</label>
                        <div class="form-group"
                            style="background-color: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed var(--text-muted); margin-bottom: 20px;">
                            <label style="font-weight: 600; color: var(--primary);">✨ Smart Scan (Optional)</label>
                            <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">Upload a bank slip
                                to auto-fill the amount</p>
                            <input type="file" id="slip-file" accept="image/*" onchange="scanSlip()">
                            <small id="scan-status"
                                style="color: var(--text-muted); display: block; margin-top: 5px; font-weight: 500;"></small>
                        </div>
                        <input type="number" step="0.01" id="expense-amount" required placeholder="$ 0.00">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="expense-category" required>
                            <option value="">Select a category</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Housing">Housing</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="expense-date" required>
                    </div>
                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <textarea id="expense-desc" placeholder="Add notes about this expense"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-submit">Add Expense</button>
                        <button type="button" class="btn btn-clear" onclick="clearForm('expense-form')">Clear</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- ================= PAGE 5: ALL TRANSACTIONS ================= -->
        <section id="page-all-transactions" class="view-page hidden">
            <h2>All Transactions</h2>
            <div class="table-responsive">
                <table class="transaction-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="all-transactions-table-body">
                        <!-- รายการทั้งหมดจะถูกใส่เข้ามาด้วย JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
